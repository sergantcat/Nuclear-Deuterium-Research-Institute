<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roblox Hub</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f0f0f;
    color:white;
}

header{
    background:#111;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:40px;
}

.card{
    background:#1b1b1b;
    border-radius:10px;
    padding:20px;
    margin:15px;
    width:250px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card img{
    width:100%;
    border-radius:8px;
}

.button{
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    background:#00ff88;
    color:black;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
}

.button:hover{
    background:#00cc6a;
}
</style>
</head>

<body>

<header>
🔥 Roblox Script Hub
</header>

<div class="container">

<div class="card">
<img src="https://tr.rbxcdn.com/180DAY-85e9c94c86d3c7b6bdfc52e4a62c9f10/420/420/Image/Png/noFilter">
<h3>Pet Simulator</h3>
<a class="button" href="#">Copy Script</a>
</div>

<div class="card">
<img src="https://tr.rbxcdn.com/180DAY-0b7b35c50a6481d948e57843b4374c1c/420/420/Image/Png/noFilter">
<h3>Blade Ball</h3>
<a class="button" href="#">Copy Script</a>
</div>

<div class="card">
<img src="https://tr.rbxcdn.com/180DAY-1df3d73cce0edc19d1ba4f843a95e6f7/420/420/Image/Png/noFilter">
<h3>Blox Fruits</h3>
<a class="button" href="#">Copy Script</a>
</div>

</div>

</body>
</html>
